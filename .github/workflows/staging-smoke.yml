name: Staging Smoke Checks

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
      BACKEND_URL: ${{ vars.STAGING_BACKEND_URL }}
      ORIGIN_HEADER: ${{ vars.STAGING_FRONTEND_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Validate staging URLs are configured
        run: |
          test -n "$FRONTEND_URL" || (echo "Missing repo variable STAGING_FRONTEND_URL" && exit 1)
          test -n "$BACKEND_URL" || (echo "Missing repo variable STAGING_BACKEND_URL" && exit 1)

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Run staging smoke checks
        run: |
          cd server
          npm run smoke:deploy
