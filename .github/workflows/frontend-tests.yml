name: Frontend Unit Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ feature/**, main ]

jobs:
  client-tests:
    name: Client unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install client deps
        run: |
          cd client
          npm ci
      - name: Run client unit tests
        run: |
          cd client
          npm run test:unit
